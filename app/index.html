<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenue !</title>
    <style>
        /* Réinitialisation de base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Style du corps de la page avec un dégradé moderne */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        /* Boîte blanche centrale (Carte) */
        .welcome-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 3rem 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 450px;
            width: 90%;
            animation: fadeIn 0.8s ease-out;
        }

        /* Animation d'apparition douce */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Icône de bienvenue */
        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        /* Titre principal */
        h1 {
            font-size: 2.2rem;
            color: #4a148c;
            margin-bottom: 1rem;
        }

        /* Texte de description */
        p {
            color: #666;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        /* Bouton d'action */
        .btn {
            display: inline-block;
            background: #764ba2;
            color: white;
            text-decoration: none;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(118, 75, 162, 0.3);
        }

        /* Effet au survol du bouton */
        .btn:hover {
            background: #5a3782;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(118, 75, 162, 0.5);
        }
    </style>
</head>
<body>

    <div class="welcome-card">
        <div class="icon">👋</div>
        <h1>Bienvenue !</h1>
        <p>Votre projet Git est bien configuré et votre serveur web local fonctionne à merveille. Prêt à coder de grandes choses ?</p>
        <a href="#" class="btn">Commencer l'aventure</a>
    </div>

</body>
</html>
